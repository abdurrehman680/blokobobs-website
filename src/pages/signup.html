<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<title>Sign Up</title>
</head>

<body class="bg-gray-100">

<nav class="bg-black text-white p-4">
  <a href="/index.html">BLOKOBOBS</a>
</nav>

<form class="max-w-md mx-auto mt-10 bg-white p-6 shadow rounded">

  <h2 class="text-2xl mb-4">Sign Up</h2>

  <input type="text" placeholder="Name" class="w-full border p-2 mb-3">
  <input type="email" placeholder="Email" class="w-full border p-2 mb-3">
  <input type="password" placeholder="Password" class="w-full border p-2 mb-3">

  <button class="bg-black text-white w-full py-2">Sign Up</button>

  <p class="mt-3 text-sm">
    Already have an account?
    <a href="/src/pages/signin.html" class="text-blue-500">Sign in</a>
  </p>

</form>

</body>
</html>
