<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link href="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.css" rel="stylesheet" />
<title>Contact</title>
</head>

<body class="bg-gray-100">

<nav class="bg-black text-white p-4 flex justify-between">
  <a href="/index.html">BLOKOBOBS</a>
</nav>

<form action="https://formspree.io/f/YOUR_FORM_ID" method="POST"
class="max-w-md mx-auto mt-10 bg-white p-6 shadow rounded">

  <h2 class="text-2xl mb-4">Contact Us</h2>

  <input type="text" name="name" placeholder="Name" required class="w-full border p-2 mb-3">
  <input type="email" name="email" placeholder="Email" required class="w-full border p-2 mb-3">
  <textarea name="message" placeholder="Message" required class="w-full border p-2 mb-3"></textarea>

  <button class="bg-black text-white px-4 py-2 w-full">Send</button>

</form>

<footer class="bg-gray-800 text-white text-center p-4 mt-10">
  © 2026 BLOKOBOBS
</footer>

</body>
</html>
